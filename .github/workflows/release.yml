name: "Publish release to PyPI"

on:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g., v0.1.0
      - v*

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: streamlit_schema_editor/frontend/package-lock.json

      - name: Build frontend
        working-directory: streamlit_schema_editor/frontend
        run: |
          npm ci
          npm run build

      - name: Build Python package
        run: uv build

      - name: Publish
        run: uv publish
