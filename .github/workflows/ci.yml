name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: streamlit_schema_editor/frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install frontend dependencies
        working-directory: streamlit_schema_editor/frontend
        run: npm ci

      - name: Ruff lint
        run: uvx ruff check .

      - name: Ruff format
        run: uvx ruff format --diff .

      - name: TypeScript check
        working-directory: streamlit_schema_editor/frontend
        run: npm run typecheck

      - name: Prettier check
        working-directory: streamlit_schema_editor/frontend
        run: npm run format:check

  test:
    name: Run tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: streamlit_schema_editor/frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build frontend
        working-directory: streamlit_schema_editor/frontend
        run: |
          npm ci
          npm run build

      - name: Run Tests
        run: uv run --no-dev --with pytest pytest tests/test_api.py

      - name: Validate example modules
        run: uv run --no-dev python -m py_compile examples/playground.py examples/databricks_mapping.py streamlit_schema_editor/__init__.py
