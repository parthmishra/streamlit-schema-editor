name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: streamlit_schema_editor/frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --extra devel

      - name: Install frontend dependencies
        run: npm --prefix streamlit_schema_editor/frontend ci

      - name: Build frontend
        run: npm --prefix streamlit_schema_editor/frontend run build

      - name: Run API tests
        run: uv run pytest tests/test_api.py

      - name: Validate example modules
        run: uv run python -m py_compile examples/playground.py examples/databricks_mapping.py streamlit_schema_editor/__init__.py
